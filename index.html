<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMS 사용자 매뉴얼 – 전남테크노파크</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* index-specific: sidebar points to sections/ subfolder */
    .nav-item[href^="sections/"] { }
  </style>
</head>
<body>

<!-- Header -->
<header id="header">
  <button id="hamburger" aria-label="메뉴">☰</button>
  <div class="logo">
    전남테크노파크
    <span>│ PMS 사용자 매뉴얼</span>
  </div>
</header>

<div id="app">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-search">
      <input id="nav-search" type="search" placeholder="메뉴 검색…" aria-label="메뉴 검색">
    </div>
    <div id="nav-list"></div>
  </nav>

  <!-- Main -->
  <main id="content">

    <div class="toc-hero">
      <h1>📋 PMS 사용자 매뉴얼</h1>
      <p>전남테크노파크 사업관리시스템(PMS) 이용 안내서입니다.<br>
         왼쪽 목차 또는 아래 카드를 클릭하여 원하는 섹션으로 이동하세요.</p>
    </div>

    <div class="toc-grid">

      <a class="toc-card" href="sections/01_사업관리.html">
        <div class="num">SECTION 01</div>
        <h3>사업관리 / 프로젝트 관리</h3>
        <p>사업 및 프로젝트 등록 방법을 안내합니다.</p>
      </a>

      <a class="toc-card" href="sections/02_지원사업공고.html">
        <div class="num">SECTION 02</div>
        <h3>지원사업공고</h3>
        <p>공고 등록 및 프로그램 등록 방법을 안내합니다.</p>
      </a>

      <a class="toc-card" href="sections/03_공고신청_기업.html">
        <div class="num">SECTION 03</div>
        <h3>공고 신청 (기업)</h3>
        <p>기업 담당자가 공고를 선택하여 단계별 신청서를 작성하는 방법을 안내합니다.</p>
      </a>

    </div>

  </main>
</div>

<script>
  /* index.html의 nav href는 sections/ 접두어가 필요하므로 재정의 */
  const NAV_INDEX = [
    {
      title: '매뉴얼 섹션',
      items: [
        { label: '01. 사업관리 / 프로젝트 관리', href: 'sections/01_사업관리.html' },
        { label: '02. 지원사업공고', href: 'sections/02_지원사업공고.html' },
        { label: '03. 공고 신청 (기업)', href: 'sections/03_공고신청_기업.html' },
        ]
    }
  ];

  document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('nav-list');
    let html = '';
    NAV_INDEX.forEach(sec => {
      html += `<div class="nav-section"><div class="nav-section-title">${sec.title}</div>`;
      sec.items.forEach(item => {
        html += `<a class="nav-item" href="${item.href}">${item.label}</a>`;
      });
      html += `</div>`;
    });
    container.innerHTML = html;

    /* search */
    const input = document.getElementById('nav-search');
    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      container.querySelectorAll('.nav-item').forEach(el => {
        el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });

    /* hamburger */
    const btn  = document.getElementById('hamburger');
    const side = document.getElementById('sidebar');
    btn.addEventListener('click', () => side.classList.toggle('open'));
    document.addEventListener('click', e => {
      if (!side.contains(e.target) && !btn.contains(e.target)) side.classList.remove('open');
    });
  });
</script>
</body>
</html>
