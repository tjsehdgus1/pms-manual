<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>22. 보고서 제출 (기업) – PMS 매뉴얼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header id="header">
  <button id="hamburger" aria-label="메뉴">☰</button>
  <div class="logo">
    전남테크노파크
    <span>│ PMS 매뉴얼</span>
  </div>
</header>

<div id="app">
  <nav id="sidebar">
    <div class="sidebar-search">
      <input id="nav-search" type="search" placeholder="메뉴 검색…" aria-label="메뉴 검색">
    </div>
    <div id="nav-list"></div>
  </nav>

  <main id="content">

    <div class="section-header">
      <div class="breadcrumb">
        <a href="../index.html" style="color:inherit;text-decoration:none;">전체 목차</a>
        &nbsp;›&nbsp; 보고서 제출
      </div>
      <h1>보고서 제출 <span class="role-badge role-company" style="vertical-align:middle;">사용자</span></h1>

    <p class="menu-path">
      <strong>메뉴 경로:</strong>
      <span class="ui-label">마이페이지</span> &gt; <span class="ui-label">과제수행</span> &gt; <span class="ui-label">보고서제출</span>
    </p>

    <!-- ── Step 1 ── -->
    <h2 id="s-과제목록">1. 보고서 제출 과제 목록 진입</h2>
    <p>왼쪽 메뉴 <span class="btn-name">「과제수행」</span> → <span class="btn-name">「보고서제출」</span> 클릭 → 해당 과제 행 클릭</p>

    <img src="https://github.com/user-attachments/assets/ee5d72eb-369d-4666-aacd-54e75ecce076" alt="보고서 제출 과제목록 화면">

    <!-- ── Step 2 ── -->
    <h2 id="s-보고서제출">2. 보고서 요청내용 확인 및 제출</h2>
    <p class="menu-path">
      <strong>메뉴 경로:</strong>
      <span class="ui-label">보고서제출</span> &gt; <span class="ui-label">보고서 요청내용 확인 및 제출</span>
    </p>
    <p>관리자가 요청한 보고서 내용을 확인하고 파일을 첨부한 후 <span class="btn-name">「제출」</span> 버튼 클릭</p>

    <img src="https://github.com/user-attachments/assets/6f64c23f-6179-429e-af49-252f2e01e9b7" alt="보고서 요청내용 확인 및 제출 화면">

    <div class="box box-tip">
      <div class="box-title">💡 안내</div>
      보고서 제출 완료 후 관리자에게 제출 알림이 발송됩니다.
    </div>

  </main>
