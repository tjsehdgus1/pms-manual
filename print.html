<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMS 매뉴얼 – 전체 인쇄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── 화면 전용 ── */
    body { background: #f8f9fb; }

    #print-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: #1B3A6B;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    #print-header .logo { font-size: 16px; font-weight: 700; }
    #print-header .logo span { opacity: 0.7; font-weight: 400; font-size: 13px; margin-left: 8px; }

    #print-btn {
      padding: 8px 20px;
      background: #fff;
      color: #1B3A6B;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    #print-btn:hover { background: #E8EEF7; }

    #loading {
      margin-top: 80px;
      text-align: center;
      padding: 60px 20px;
      color: #555;
      font-size: 15px;
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid #D0DCF0;
      border-top-color: #1B3A6B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #print-body {
      max-width: 900px;
      margin: 72px auto 60px;
      padding: 0 24px;
    }

    /* 섹션 구분 */
    .print-section {
      background: #fff;
      border-radius: 10px;
      padding: 40px 48px;
      margin-bottom: 32px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* 섹션 헤더 숨김 처리 (breadcrumb) */
    .print-section .breadcrumb { display: none; }

    /* ── 인쇄 전용 ── */
    @media print {
      #print-header, #print-btn, #loading { display: none !important; }

      body { background: #fff !important; font-size: 11pt; }

      #print-body {
        max-width: 100%;
        margin: 0;
        padding: 0;
      }

      .print-section {
        page-break-before: always;
        break-before: page;
        box-shadow: none;
        border-radius: 0;
        padding: 20mm 15mm;
        margin: 0;
        background: #fff;
      }

      .print-section:first-child {
        page-break-before: avoid;
        break-before: avoid;
      }

      /* 이미지 페이지 이탈 방지 */
      img {
        max-width: 100% !important;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* 박스 이탈 방지 */
      .box {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* h2 이후 내용이 페이지 분리되지 않도록 */
      h2 { page-break-after: avoid; break-after: avoid; }

      /* 링크 URL 숨김 */
      a[href]::after { content: none !important; }

      /* 메뉴 경로 색상 보정 */
      .ui-label {
        background: #E8EEF7 !important;
        color: #1B3A6B !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .box-warn {
        background: #FFFBEB !important;
        border-left: 4px solid #F59E0B !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .box-tip {
        background: #EFF6FF !important;
        border-left: 4px solid #3B82F6 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .role-badge {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

<div id="print-header">
  <div class="logo">전남테크노파크 <span>│ PMS 매뉴얼 전체 인쇄</span></div>
  <button id="print-btn" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
</div>

<div id="loading">
  <div class="loading-spinner"></div>
  매뉴얼 섹션을 불러오는 중입니다…
</div>

<div id="print-body"></div>

<script>
'use strict';

// 인쇄할 섹션 순서 (NAV 순서와 동일)
const SECTIONS = [
  { file: 'sections/00a_일반회원_가입.html',                      role: 'user' },
  { file: 'sections/00b_기업기관_회원가입.html',                  role: 'user' },
  { file: 'sections/00c_평가위원_신청.html',                      role: 'evaluator' },
  { file: 'sections/01_사업관리.html',                            role: 'admin' },
  { file: 'sections/02_지원사업공고.html',                        role: 'admin' },
  { file: 'sections/03_공고신청_기업.html',                       role: 'user' },
  { file: 'sections/04_요건검토_보완요청.html',                   role: 'admin' },
  { file: 'sections/05_보완요청_답변_기업.html',                  role: 'user' },
  { file: 'sections/06_보완요청_답변검토_관리자.html',            role: 'admin' },
  { file: 'sections/07_선정평가_등록_관리자.html',                role: 'admin' },
  { file: 'sections/08_선정평가_진행_평가위원.html',              role: 'evaluator' },
  { file: 'sections/09_선정평가_진행_평가위원장.html',            role: 'evaluator' },
  { file: 'sections/10_선정결과_처리_관리자.html',                role: 'admin' },
  { file: 'sections/11_평가결과_확인_기업.html',                  role: 'user' },
  { file: 'sections/12_협약정보_등록요청_관리자.html',            role: 'admin' },
  { file: 'sections/13_협약정보_등록_기업.html',                  role: 'user' },
  { file: 'sections/14_협약정보_검토_협약서등록_관리자.html',     role: 'admin' },
  { file: 'sections/15_전자협약_진행_기업.html',                  role: 'user' },
  { file: 'sections/16_전자협약_진행_관리자.html',                role: 'admin' },
  { file: 'sections/17_사업비_지급신청_기업.html',                role: 'user' },
  { file: 'sections/18_사업비_지급처리_관리자.html',              role: 'admin' },
  { file: 'sections/19_사업비_집행관리_기업.html',                role: 'user' },
  { file: 'sections/20_사업비_집행확인_관리자.html',              role: 'admin' },
  { file: 'sections/21_보고서_제출요청_관리자.html',              role: 'admin' },
  { file: 'sections/22_보고서_제출_기업.html',                    role: 'user' },
  { file: 'sections/23_보고서_제출확인_관리자.html',              role: 'admin' },
];

async function loadSections() {
  const container = document.getElementById('print-body');
  const loading   = document.getElementById('loading');

  for (const s of SECTIONS) {
    try {
      const res  = await fetch(s.file);
      const text = await res.text();
      const doc  = new DOMParser().parseFromString(text, 'text/html');
      const main = doc.querySelector('main#content');
      if (!main) continue;

      // 섹션 div 생성
      const div = document.createElement('div');
      div.className = 'print-section';
      div.dataset.role = s.role;
      div.innerHTML = main.innerHTML;

      // 섹션 내 상대경로 이미지 보정 (sections/ 경로)
      div.querySelectorAll('img').forEach(img => {
        const src = img.getAttribute('src') || '';
        if (src.startsWith('../')) {
          img.src = src.replace('../', '');
        }
      });

      container.appendChild(div);
    } catch (e) {
      console.warn('섹션 로드 실패:', s.file, e);
    }
  }

  loading.style.display = 'none';
}

loadSections();
</script>
</body>
</html>
